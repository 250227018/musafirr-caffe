<!DOCTYPE html>
<html>

<head>
    <title>Musafirr Caffe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a00;
            color: #f5e8c8;
            font-family: Georgia, serif;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, #3d1a00, #1a0a00);
            border-bottom: 2px solid #d4852a;
        }

        .header h1 {
            font-size: 52px;
            color: #f0b840;
            letter-spacing: 3px;
        }

        .header p {
            color: #9a8060;
            font-style: italic;
            margin-top: 8px;
            font-size: 16px;
        }

        .name-box {
            text-align: center;
            padding: 24px;
        }

        .name-box label {
            display: block;
            color: #d4852a;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .name-box input {
            padding: 12px 20px;
            width: 300px;
            border-radius: 6px;
            border: 1px solid #d4852a;
            background: #2a1200;
            color: #f5e8c8;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .main {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            align-items: start;
        }

        .menu-section {
            flex: 1;
        }

        .menu-section h2 {
            text-align: center;
            font-size: 32px;
            color: #f0b840;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }

        .category {
            margin-bottom: 30px;
        }

        .category h3 {
            font-size: 20px;
            color: #d4852a;
            border-bottom: 1px solid #d4852a44;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        .menu-card {
            background: #2a1200;
            border: 1px solid #d4852a44;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            border-color: #d4852a;
        }

        .menu-card .emoji {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .menu-card .item-name {
            font-size: 15px;
            font-weight: bold;
            color: #f5e8c8;
            margin-bottom: 4px;
        }

        .menu-card .item-price {
            font-size: 18px;
            color: #f0b840;
            margin-bottom: 12px;
        }

        .add-btn {
            background: #d4852a;
            color: #1a0a00;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #f0b840;
        }

        .cart-panel {
            width: 300px;
            background: #2a1200;
            border: 1px solid #d4852a;
            border-radius: 12px;
            padding: 24px;
            position: sticky;
            top: 20px;
        }

        .cart-panel h2 {
            text-align: center;
            color: #f0b840;
            font-size: 22px;
            margin-bottom: 16px;
            border-bottom: 1px solid #d4852a44;
            padding-bottom: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #d4852a22;
            font-size: 14px;
        }

        .cart-empty {
            text-align: center;
            color: #9a8060;
            font-style: italic;
            padding: 20px 0;
        }

        .total-box {
            background: #3d1a00;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
        }

        .total-box .total-amt {
            font-size: 32px;
            color: #f0b840;
            font-weight: bold;
        }

        .total-box .gst-info {
            font-size: 12px;
            color: #9a8060;
            margin-top: 4px;
        }

        .order-btn {
            width: 100%;
            background: #d4852a;
            color: #1a0a00;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 14px;
            letter-spacing: 2px;
            transition: background 0.2s;
        }

        .order-btn:hover {
            background: #f0b840;
        }

        .clear-btn {
            width: 100%;
            background: transparent;
            color: #c0392b;
            border: 1px solid #c0392b;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #c0392b;
            color: white;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #9a8060;
            font-style: italic;
            border-top: 1px solid #d4852a44;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>☕ Musafirr Caffe</h1>
        <p>"Every sip is a journey, every bite is a memory"</p>
    </div>

    <div class="name-box">
        <label>APNA NAAM LIKHO</label>
        <input type="text" id="name" placeholder="Tumhara naam..." />
    </div>

    <div class="main">
